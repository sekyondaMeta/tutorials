name: Tutorials Audit

on:
  schedule:
    - cron: '0 0 15 * *'  # 15th of every month at midnight UTC
  workflow_dispatch:       # manual trigger

jobs:
  audit:
    if: github.repository == 'sekyondaMeta/tutorials'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read       # read repo files
      actions: read        # needed to fetch build logs from previous workflow runs
      issues: write        # needed to create/close issues
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run audit
        id: audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/audit_tutorials.py

      - name: Create issue and close previous
        if: steps.audit.outputs.found_issues == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const reportContent = fs.readFileSync('audit_report.md', 'utf8');
            const label = 'tutorials-audit';
            const title = `📋 Tutorials Audit Report — ${new Date().toISOString().split('T')[0]}`;

            // Step 1: Create the new issue (report only — no @claude in the body)
            const { data: newIssue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: reportContent,
              labels: [label],
            });
            console.log(`Created new issue #${newIssue.number}`);

            // Wait for GitHub to propagate the issue node before commenting
            await new Promise(resolve => setTimeout(resolve, 2000));

            // Step 2: Post @claude trigger as a separate comment
            // This separates untrusted data (issue body) from Claude's instructions (comment)
            const claudePrompt = [
              '@claude Please analyze this tutorials audit report using the tutorials-audit skill.',
              '',
              'Key tasks:',
              '1. Read the raw PyTorch changelog sections and identify deprecations that the regex extraction missed.',
              '2. Check the regex extraction results for directionality errors — cases where the matched API is actually the replacement, not the deprecated one.',
              '3. Triage all findings across all audit categories. Filter false positives and assess severity.',
              '4. Post a prioritized action plan with specific file paths, line numbers, and suggested fixes.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: newIssue.number,
              body: claudePrompt,
            });
            console.log(`Posted Claude trigger comment on #${newIssue.number}`);

            // Step 3: Find and close previous audit issues
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 10,
            });

            for (const issue of openIssues) {
              if (issue.number === newIssue.number) continue;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Superseded by new audit report — see #${newIssue.number}`,
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`Closed previous issue #${issue.number}`);
            }
